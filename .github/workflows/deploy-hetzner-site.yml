name: Deploy → Hetzner (Site de teste)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH para Hetzner (site)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configurar chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Adicionar servidor ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2234 -H 37.27.17.25 >> ~/.ssh/known_hosts

      - name: Deploy no servidor (git pull real + build + restart)
        run: |
          ssh -p 2234 root@37.27.17.25 '
            set -e
            cd /opt/visualdesign-site
            git fetch origin
            git reset --hard "${{ github.sha }}"
            npm ci --prefer-offline --no-audit --no-fund
            CI="" npm run build
            pm2 restart visualdesign-site --update-env || pm2 start npm --name "visualdesign-site" -- start -- -p 3003
            pm2 save
          '

      - name: Verificar que o servidor ficou no commit certo
        run: |
          DEPLOYED_SHA=$(ssh -p 2234 root@37.27.17.25 'cd /opt/visualdesign-site && git rev-parse HEAD')
          echo "Commit no servidor: $DEPLOYED_SHA"
          echo "Commit esperado:    ${{ github.sha }}"
          if [ "$DEPLOYED_SHA" != "${{ github.sha }}" ]; then
            echo "❌ ERRO: o servidor NÃO ficou no commit esperado. Deploy falhou de verdade."
            exit 1
          fi
          echo "✅ Commit confirmado no servidor."

      # Site de teste ainda pode não ter DNS/SSL prontos — não bloquear o
      # workflow por isso, só reportar o estado.
      - name: Verificar que o site responde depois do reinício
        continue-on-error: true
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://site.visualdesignmoz.com/)
          echo "Status de / depois do deploy: $STATUS"
