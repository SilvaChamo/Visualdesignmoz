name: Deploy → Hetzner (Painel)

on:
  push:
    branches:
      - main
      - preview/grid-servicos-web

jobs:
  deploy:
    name: Deploy via SSH para Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configurar chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Adicionar servidor ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2234 -H 37.27.17.25 >> ~/.ssh/known_hosts

      - name: Deploy no servidor (git pull real + build + restart)
        run: |
          ssh -p 2234 root@37.27.17.25 '
            set -e
            cd /opt/visualdesign-panel
            git fetch origin
            git reset --hard "${{ github.sha }}"
            npm ci --prefer-offline --no-audit --no-fund
            CI="" npm run build
            pm2 restart visualdesign-panel --update-env || pm2 start npm --name "visualdesign-panel" -- start
            pm2 save
          '

      - name: Verificar que o servidor ficou no commit certo
        run: |
          DEPLOYED_SHA=$(ssh -p 2234 root@37.27.17.25 'cd /opt/visualdesign-panel && git rev-parse HEAD')
          echo "Commit no servidor: $DEPLOYED_SHA"
          echo "Commit esperado:    ${{ github.sha }}"
          if [ "$DEPLOYED_SHA" != "${{ github.sha }}" ]; then
            echo "❌ ERRO: o servidor NÃO ficou no commit esperado. Deploy falhou de verdade."
            exit 1
          fi
          echo "✅ Commit confirmado no servidor."

      - name: Verificar que o site responde depois do reinício
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://painel.visualdesignmoz.com/login)
          echo "Status de /login depois do deploy: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ ERRO: /login devolveu $STATUS em vez de 200 depois do restart."
            exit 1
          fi
          echo "✅ Site respondeu normalmente depois do deploy."
