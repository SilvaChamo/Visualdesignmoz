<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conta Suspensa</title>
  <link rel="icon" href="/favicon.png" sizes="48x48" type="image/png">
  <link rel="shortcut icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Exo 2", system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #171717;
      min-height: 100vh;
    }

    .shell {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      height: 150px;
      padding: 0 24px 15px;
      background: #ffffff;
      width: 100%;
      text-align: center;
    }

    .header-icon {
      width: 150px;
      height: 150px;
      color: #d4d4d8;
      flex-shrink: 0;
      display: block;
      overflow: hidden;
    }

    .header-title {
      font-size: 56px;
      font-weight: 700;
      color: #d4d4d8;
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0;
    }

    .banner {
      position: relative;
      overflow: hidden;
      background: #09090b;
      width: 100%;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 48px;
      border-bottom: 4px solid #dc2626;
    }

    .banner-icon {
      position: absolute;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      height: 200px;
      color: rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .banner-content {
      position: relative;
      z-index: 1;
      color: #ffffff;
      text-align: center;
      max-width: 800px;
    }

    .banner-content h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .banner-content p {
      font-size: 22px;
      font-weight: 400;
      color: #e4e4e7;
      line-height: 1.5;
    }

    .banner-content a {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .banner-content a:hover {
      color: #f87171;
    }

    .footer {
      background: #ffffff;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px 24px 0;
    }

    .footer-brand img {
      height: 72px;
      width: auto;
    }

    @media (max-width: 768px) {
      .header {
        gap: 12px;
        height: 150px;
        padding: 0 20px 15px;
      }

      .header-icon {
        width: 150px;
        height: 150px;
      }

      .header-title {
        font-size: 40px;
      }

      .banner {
        height: 240px;
        padding: 0 24px;
      }

      .banner-icon {
        width: 130px;
        height: 130px;
        left: 12px;
      }

      .banner-content h2 {
        font-size: 24px;
      }

      .banner-content p {
        font-size: 18px;
      }

      .footer-brand img {
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <svg class="header-icon" viewBox="10 0 54 58" preserveAspectRatio="xMinYMax meet" fill="currentColor" aria-hidden="true">
        <circle cx="32" cy="20" r="12"/>
        <path d="M10 58c0-12.15 9.85-22 22-22s22 9.85 22 22H10z"/>
        <path d="M46 18l6 6M52 18l-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"/>
      </svg>
      <h1 class="header-title">Conta Suspensa</h1>
    </header>

    <section class="banner">
      <svg class="banner-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
      </svg>
      <div class="banner-content">
        <h2>Esta conta foi suspensa.</h2>
        <p>
          <a href="mailto:admin@visualdesignmoz.com">Contacte o seu fornecedor de alojamento</a>
          para mais informações.
        </p>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-brand">
        <img src="https://visualdesignmoz.com/assets/logotype.png" alt="VisualDesign" width="280" height="72">
      </div>
    </footer>
  </div>
</body>
</html>
